name: Bug report
description: Report a problem with Porthole
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

  - type: input
    id: version
    attributes:
      label: Porthole version
      description: Release tag, commit hash, or "built from source"
      placeholder: e.g. v1.0 or main @ abc1234
    validations:
      required: true

  - type: dropdown
    id: bundle
    attributes:
      label: Bundle variant
      options:
        - Porthole-universal.app
        - Porthole-arm64.app
        - Porthole-x86_64.app
        - Built from source
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: e.g. macOS 15.5 on MacBook Pro M3
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Capture device
      description: UVC device or webcam model, if relevant
      placeholder: e.g. Elgato Cam Link 4K

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch Porthole
        2. Connect capture card
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Console output, screenshots, or anything else that helps
